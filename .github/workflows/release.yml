name: Auto Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (version bump)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: version
        run: |
          CURRENT=$(grep -oP 'my \$VERSION = "\K[^"]+' watchmysql)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          # Parse major.minor and bump minor
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version in daemon
        run: |
          sed -i "s/my \$VERSION = \"${{ steps.version.outputs.current }}\"/my \$VERSION = \"${{ steps.version.outputs.new }}\"/" watchmysql

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchmysql
          git commit -m "Bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          mkdir -p dist
          tar czf "dist/watchmysql-v${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='dist' \
            --exclude='whmplugin/DEV_MODE' \
            --exclude='whmplugin/dev/.my.cnf' \
            --exclude='default.profraw' \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: WatchMySQL v${{ steps.version.outputs.new }}
          generate_release_notes: true
          files: dist/watchmysql-v${{ steps.version.outputs.new }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
